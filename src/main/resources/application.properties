# Ollama configuration for chat
quarkus.langchain4j.ollama.chat-model.base-url=http://localhost:11434
quarkus.langchain4j.ollama.chat-model.model-id=qwen2.5-coder:3b
# Do not preload model during dev/test to avoid memory issues
quarkus.langchain4j.ollama.dev-services.preload-models=false
quarkus.langchain4j.ollama.chat-model.temperature=0.1

# Ollama configuration for embeddings (Nomic)
quarkus.langchain4j.ollama.embedding-model.base-url=http://localhost:11434
quarkus.langchain4j.ollama.embedding-model.model-id=nomic-embed-text


# Logging configuration (optional)
quarkus.log.level=INFO

# Qdrant configuration
quarkus.langchain4j.qdrant.host=localhost
quarkus.langchain4j.qdrant.port=6334
quarkus.langchain4j.qdrant.collection.name=java-code-assistant
quarkus.langchain4j.qdrant.collection.dimension=768
quarkus.langchain4j.qdrant.collection.auto-create=true