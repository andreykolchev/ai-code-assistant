services:
  #(LMM + Embeddings)
  ollama:
    image: ollama/ollama:latest
    container_name: ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_storage:/root/.ollama
    networks:
      - ai-network

  # Vector DB
  qdrant:
    image: qdrant/qdrant:v1.16.3
    container_name: qdrant
    ports:
      - "6333:6333" # API port
      - "6334:6334" # gRPC port (bedt for LangChain4j)
    volumes:
      - qdrant_storage:/qdrant/storage
    networks:
      - ai-network

volumes:
  ollama_storage:
  qdrant_storage:

networks:
  ai-network:
    driver: bridge

